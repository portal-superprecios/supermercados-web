<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 1 - Portada</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap');
      
      :root {
        --sp-navy: #0D1B3E;
        --sp-teal: #00FFAA;
        --sp-white: #FFFFFF;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      
      body {
        width: 600px; height: 600px; /* Square 1:1 */
        background: var(--sp-navy);
        font-family: 'Outfit', sans-serif;
        display: flex; align-items: center; justify-content: center;
        position: relative; overflow: hidden;
      }

      .bg-gradient {
        position: absolute; inset: 0;
        background: radial-gradient(circle at top right, #1a2a5a, #0D1B3E);
      }

      .accent {
        position: absolute; top: -100px; right: -100px;
        width: 400px; height: 400px;
        background: var(--sp-teal);
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.15;
      }

      .content {
        position: relative; z-index: 10;
        text-align: center;
      }

      .badge {
        background: var(--sp-teal);
        color: var(--sp-navy);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 4px;
        text-transform: uppercase;
        padding: 10px 30px;
        border-radius: 100px;
        display: inline-block;
        margin-bottom: 40px;
      }

      h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 110px;
        color: var(--sp-white);
        line-height: 0.85;
        letter-spacing: 2px;
      }

      h1 span {
        color: var(--sp-teal);
      }

      .sub {
        margin-top: 25px;
        font-size: 20px;
        color: rgba(255,255,255,0.6);
        letter-spacing: 3px;
        text-transform: uppercase;
        font-weight: 600;
      }

      .footer {
        position: absolute; bottom: 40px;
        display: flex; align-items: center; gap: 12px;
      }

      .icon {
        width: 25px; height: 25px;
        background: var(--sp-teal);
        clip-path: polygon(50% 0%, 90% 25%, 90% 75%, 50% 100%, 10% 75%, 10% 25%);
      }

      .brand { font-weight: 700; color: rgba(255,255,255,0.8); font-size: 18px; }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="accent"></div>
    <div class="content">
        <div class="badge">Informe INDEC</div>
        <h1>Inflación<br><span>Febrero</span><br>2026</h1>
        <div class="sub">Región Patagonia</div>
    </div>
    <div class="footer">
        <div class="icon"></div>
        <div class="brand">SuperPrecios</div>
    </div>
</body>
</html>
